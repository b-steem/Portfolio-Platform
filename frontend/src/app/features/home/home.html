<app-navbar></app-navbar>

<section id="home" class="hero section">
  <div class="container hero__content">
    @if (isLoadingProfile) {
      <div class="skeleton skeleton--text short"></div>
    } @else if (profileErrorMessage) {
      <div class="profile__fallback">
        <p class="profile__status profile__status--error">{{ profileErrorMessage }}</p>
        <button class="btn btn-secondary" type="button" (click)="reloadProjects()">
        Try Again
        </button>
      </div>
    } @else if (profile) {
      <p class="eyebrow">Hi, I'm</p>
      <div class="hero__divider"></div>

      <h1 class="section-title">{{ profile.name }}</h1>

      <p class="section-subtitle">
        {{ profile.headline }}
      </p>

      <p class="hero__about">
        {{ profile.about }}
      </p>

      <div class="hero__actions">
        <a class="btn btn-primary" href="#projects">View Projects</a>
        <a class="btn btn-secondary" href="#contact">Contact Me</a>
      </div>
    }
  </div>
</section>

<app-projects></app-projects>

<app-contact></app-contact>

<app-footer></app-footer>
